name: Scrape & notify

on:
  schedule:
    - cron: '*/20 * * * *' # var ~20:e minut (GitHub kan dröja/hoppa under last)
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape-läge (light/full). Tomt = auto utifrån timme."
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Bestäm läge: manuell input vinner; annars 'full' vid timmar i
      # config.fullModeHours, annars 'light'.
      - name: Bestäm läge
        id: mode
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT" ]; then
            echo "mode=$INPUT" >> "$GITHUB_OUTPUT"
          else
            MODE=$(node -e '
              const h = new Date().getUTCHours();
              const cfg = require("./config.json");
              const full = (cfg.fullModeHours || [6,14,22]).includes(h);
              process.stdout.write(full ? "full" : "light");
            ')
            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          fi
          echo "Valt läge: $(cat "$GITHUB_OUTPUT" | sed -n 's/^mode=//p')"

      - name: Scrapa möten
        run: npm run scrape
        env:
          SCRAPE_MODE: ${{ steps.mode.outputs.mode }}
          SUBS_ENDPOINT: ${{ secrets.SUBS_ENDPOINT }}
          SUBS_TOKEN: ${{ secrets.SUBS_TOKEN }}

      - name: Skicka notiser
        run: npm run push
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SUBS_ENDPOINT: ${{ secrets.SUBS_ENDPOINT }}
          SUBS_TOKEN: ${{ secrets.SUBS_TOKEN }}
          PUSH_SUBSCRIPTIONS: ${{ secrets.PUSH_SUBSCRIPTIONS }}

      - name: Committa uppdaterad data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/feed.xml docs/agenda-index.json
          if git diff --staged --quiet; then
            echo "Inga ändringar att committa."
          else
            git commit -m "Uppdaterad mötesdata $(date -u +%Y-%m-%dT%H:%MZ) [${{ steps.mode.outputs.mode }}]"
            git push
          fi
